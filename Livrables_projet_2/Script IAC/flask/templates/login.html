<!DOCTYPE html>
<html>
<head>
    <title>Connexion - Laser-Campus</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>Connexion</h1>
    <form method="POST">
        <label>Email :</label>
        <input type="email" name="email" required><br><br>
        
        <label>Mot de passe :</label>
        <input type="password" name="mot_de_passe" required><br><br>
        
        <button type="submit">Se connecter</button>
    </form>
    <p><a href="/signup">Créer un compte</a> | <a href="/guest">Accès invité</a></p>
</body>
</html>
