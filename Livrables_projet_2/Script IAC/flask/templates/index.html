<!DOCTYPE html>
<html>
<head>
    <title>Accueil - Laser-Campus</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            text-align: center;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #545b62;
        }
    </style>
</head>
<body>
    <h1>Bienvenue sur Laser-Campus</h1>
    <p>Plateforme d'authentification et d'accès aux ressources</p>
    
    <div>
        <a href="/login" class="btn">Se connecter</a>
        <a href="/signup" class="btn">Créer un compte</a>
    </div>
    
    <div style="margin-top: 30px;">
        <a href="/guest" class="btn btn-secondary">Accès invité</a>
    </div>
</body>
</html>
